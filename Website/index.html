<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCDN</title>
<link rel="stylesheet" href="style.css">

<style>
/* Removes scrollbars and makes the background black */
body {
    margin: 0;
    overflow: hidden;
    background-color: #000000;
}

/* Floats your topbar over the game so it doesn't push the layout down */
#topbar {
    position: absolute;
    top: 10px;
    left: 20px;
    color: white;
    z-index: 10;
}
</style>

<script>
window.RufflePlayer = window.RufflePlayer || {};
window.RufflePlayer.config = {
    autoplay: "on",
    unmuteOverlay: "visible",
    letterbox: "on" /* This is the native Ruffle way to keep aspect ratio safe */
};
</script>
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>

<body>

<div id="topbar">
    <h1>MCDN</h1>
</div>

<div id="game"></div>

<script>
// 1. Automatically load the game when the page is ready
window.addEventListener("DOMContentLoaded", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    const container = document.getElementById("game");
    container.innerHTML = "";
    container.appendChild(player);

    // 2. Tell the player to fill the browser window
    player.style.width = "100vw";
    player.style.height = "100vh";
    player.style.display = "block";

    // 3. YOUR exact original load settings, completely untouched
    player.load({
        url: "https://raw.githubusercontent.com/velvessences/MCDN/main/Main_23_04.swf",
        allowScriptAccess: true,
        backgroundColor: "#000000",
        forceNetwork: true,
        quality: "low",
        scale: "showAll"
    });
});
</script>

</body>
</html>
